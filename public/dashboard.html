<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayLoop - Orders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; color: #1e293b; }
    
    /* Header */
    .header { background: white; padding: 16px 24px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .header button { padding: 8px 16px; background: #f1f5f9; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .header button:hover { background: #e2e8f0; }
    
    /* Stats */
    .stats { display: flex; gap: 16px; padding: 24px; flex-wrap: wrap; }
    .stat { background: white; padding: 20px; border-radius: 8px; min-width: 150px; }
    .stat-label { color: #64748b; font-size: 13px; margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    
    /* Orders */
    .orders { background: white; margin: 0 24px 24px; border-radius: 8px; overflow: hidden; }
    .orders-header { padding: 16px 20px; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    th { background: #f8fafc; font-weight: 600; font-size: 12px; text-transform: uppercase; color: #64748b; }
    tr:hover td { background: #f8fafc; }
    .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-declined { background: #fee2e2; color: #991b1b; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .btn { padding: 6px 12px; background: #6366f1; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn:hover { background: #4f46e5; }
    
    /* Modal */
    .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { font-size: 18px; }
    .modal-close { background: none; border: none; font-size: 28px; cursor: pointer; color: #64748b; line-height: 1; }
    .modal-body { padding: 20px; }
    
    .section { margin-bottom: 20px; }
    .section-title { font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 10px; letter-spacing: 0.05em; }
    .row { display: flex; gap: 20px; }
    .col { flex: 1; }
    .field { margin-bottom: 8px; }
    .field-label { font-size: 12px; color: #64748b; }
    .field-value { font-weight: 500; }
    
    .items-list { background: #f8fafc; border-radius: 8px; padding: 12px; }
    .item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #e2e8f0; }
    .item:last-child { border-bottom: none; }
    .item img { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
    .item-info { flex: 1; }
    .item-price { font-weight: 600; }
    
    .subscription-box { background: #ede9fe; padding: 16px; border-radius: 8px; }
    .subscription-box h4 { margin-bottom: 8px; }
    
    .empty { text-align: center; padding: 40px; color: #64748b; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>🦀</span> PayLoop Orders</h1>
    <button onclick="logout()">Sign Out</button>
  </div>
  
  <div class="stats" id="stats"></div>
  
  <div class="orders">
    <div class="orders-header">All Orders</div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Customer</th>
          <th>Total</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>
  
  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Order Details</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    // Auth check
    const token = localStorage.getItem('auth_token');
    if (!token) window.location.href = '/login';
    
    // API helper
    async function api(url) {
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.status === 401) { localStorage.removeItem('auth_token'); window.location.href = '/login'; return; }
      return res.json();
    }
    
    // Format helpers
    const $ = (n) => n ? '$' + n.toFixed(2) : '$0.00';
    const date = (d) => new Date(d).toLocaleDateString();
    const name = (c) => c ? `${c.firstName || ''} ${c.lastName || ''}`.trim() || c.email : 'Unknown';
    
    // Load stats
    async function loadStats() {
      const s = await api('/api/stats');
      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-label">Revenue</div><div class="stat-value">${$(s.totalRevenue)}</div></div>
        <div class="stat"><div class="stat-label">Orders</div><div class="stat-value">${s.totalOrders || 0}</div></div>
        <div class="stat"><div class="stat-label">Approved</div><div class="stat-value">${s.approvedOrders || 0}</div></div>
        <div class="stat"><div class="stat-label">Declined</div><div class="stat-value">${s.declinedOrders || 0}</div></div>
      `;
    }
    
    // Load orders
    async function loadOrders() {
      const orders = await api('/api/orders');
      const tbody = document.getElementById('ordersBody');
      
      if (!orders || orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No orders yet</td></tr>';
        return;
      }
      
      tbody.innerHTML = orders.map(o => `
        <tr>
          <td>${date(o.createdAt)}</td>
          <td>${name(o.customer)}<br><small style="color:#64748b">${o.customer?.email || ''}</small></td>
          <td><strong>${$(o.total)}</strong></td>
          <td><span class="status status-${o.status}">${o.status}</span></td>
          <td><button class="btn" onclick="viewOrder('${o.id}')">View</button></td>
        </tr>
      `).join('');
    }
    
    // View order detail
    async function viewOrder(id) {
      const o = await api('/api/orders/' + id);
      let items = [];
      try { items = JSON.parse(o.items || '[]'); } catch(e) {}
      
      // Get subscriptions for this customer
      const subs = await api('/api/subscriptions');
      const customerSubs = subs.filter(s => s.customerId === o.customerId);
      
      document.getElementById('modalTitle').textContent = 'Order ' + o.id.slice(0, 8);
      document.getElementById('modalBody').innerHTML = `
        <div style="background:${o.status === 'approved' ? '#d1fae5' : o.status === 'declined' ? '#fee2e2' : '#fef3c7'};padding:16px;border-radius:8px;margin-bottom:20px;">
          <span class="status status-${o.status}" style="font-size:14px">${o.status.toUpperCase()}</span>
          <span style="font-size:24px;font-weight:700;float:right">${$(o.total)}</span>
        </div>
        
        <div class="row">
          <div class="col">
            <div class="section">
              <div class="section-title">Customer</div>
              <div class="field"><span class="field-label">Name:</span> <span class="field-value">${name(o.customer)}</span></div>
              <div class="field"><span class="field-label">Email:</span> <span class="field-value">${o.customer?.email || ''}</span></div>
              <div class="field"><span class="field-label">Phone:</span> <span class="field-value">${o.customer?.phone || 'N/A'}</span></div>
              <div class="field"><span class="field-label">Address:</span> <span class="field-value">${o.customer?.address || ''} ${o.customer?.city || ''} ${o.customer?.state || ''} ${o.customer?.zip || ''}</span></div>
            </div>
          </div>
          <div class="col">
            <div class="section">
              <div class="section-title">Payment</div>
              <div class="field"><span class="field-label">Subtotal:</span> <span class="field-value">${$(o.subtotal)}</span></div>
              <div class="field"><span class="field-label">Tax:</span> <span class="field-value">${$(o.tax)}</span></div>
              <div class="field"><span class="field-label">Shipping:</span> <span class="field-value">${$(o.shipping)}</span></div>
              <div class="field"><span class="field-label">Transaction:</span> <span class="field-value">${o.nmiTransactionId || 'N/A'}</span></div>
              <div class="field"><span class="field-label">Auth Code:</span> <span class="field-value">${o.nmiAuthCode || 'N/A'}</span></div>
            </div>
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">Items (${items.length})</div>
          <div class="items-list">
            ${items.map(i => `
              <div class="item">
                ${i.image ? `<img src="${i.image}" alt="">` : '<div style="width:48px;height:48px;background:#e2e8f0;border-radius:4px"></div>'}
                <div class="item-info">
                  <strong>${i.name}</strong><br>
                  <small>Qty: ${i.quantity} × $${i.price}</small>
                </div>
                <div class="item-price">$${(i.price * i.quantity).toFixed(2)}</div>
              </div>
            `).join('')}
          </div>
        </div>
        
        ${customerSubs.length > 0 ? `
          <div class="section">
            <div class="section-title">Subscriptions</div>
            ${customerSubs.map(s => `
              <div class="subscription-box">
                <h4>${s.name}</h4>
                <div class="row">
                  <div class="col">
                    <div class="field"><span class="field-label">Status:</span> <span class="status status-${s.status}">${s.status}</span></div>
                    <div class="field"><span class="field-label">Bills:</span> <span class="field-value">${s.totalBills || 0}</span></div>
                  </div>
                  <div class="col">
                    <div class="field"><span class="field-label">Next:</span> <span class="field-value">${s.nextBillDate ? date(s.nextBillDate) : 'N/A'}</span></div>
                    <div class="field"><span class="field-label">Gateway:</span> <span class="field-value">${s.gatewayId || 'N/A'}</span></div>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        ` : ''}
        
        <div style="font-size:12px;color:#64748b;margin-top:20px">
          Order ID: ${o.id}<br>
          Created: ${new Date(o.createdAt).toLocaleString()}
        </div>
      `;
      
      document.getElementById('modal').classList.add('show');
    }
    
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    function logout() { localStorage.removeItem('auth_token'); window.location.href = '/login'; }
    
    // Init
    loadStats();
    loadOrders();
  </script>
</body>
</html>
