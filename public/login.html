<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PayLoop - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
    h1 { text-align: center; margin-bottom: 30px; color: #1e293b; }
    h1 span { font-size: 40px; }
    input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 16px; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #6366f1; }
    button { width: 100%; padding: 14px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #4f46e5; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
    .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .footer { text-align: center; margin-top: 20px; color: #64748b; font-size: 14px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1><span>🦀</span><br>PayLoop</h1>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required value="admin@mellone.co">
      <input type="password" id="password" placeholder="Password" required value="PayLoop2024!">
      <button type="submit" id="submitBtn">Sign In</button>
    </form>
    <div class="footer">Secure dashboard for PayLoop</div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('auth_token')) {
      window.location.href = '/dashboard';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error');
      const btn = document.getElementById('submitBtn');
      
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorDiv.style.display = 'none';
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (data.token) {
          localStorage.setItem('auth_token', data.token);
          window.location.href = '/dashboard';
        } else {
          throw new Error(data.error || 'Login failed');
        }
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
